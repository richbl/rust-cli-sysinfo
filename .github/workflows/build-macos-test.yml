name: Build macOS test binary

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-arm64:
    name: Build macOS Apple Silicon binary
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/YOUR_BINARY_NAME dist/
          cd dist
          zip -r YOUR_BINARY_NAME-macos-arm64.zip YOUR_BINARY_NAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-cli-sysinfo-macos-arm64
          path: dist/rust-cli-sysinfo-macos-arm64.zip
          retention-days: 14

# Set upper limit for function length to prevent excessively long functions that are hard to read and maintain
too-many-lines-threshold = 50

# Set upper limit for nesting levels to prevent code that is too deeply nested, which can be difficult to understand and maintain
excessive-nesting-threshold = 5

# Limit cognitive load per function to prevent functions that are too complex to understand easily
cognitive-complexity-threshold = 8

# Set upper limit for the number of arguments a function can have
too-many-arguments-threshold = 7
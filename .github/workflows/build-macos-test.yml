name: Build macOS (Intel) Test Binary

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-intel:
    name: Build macOS Intel Binary
    runs-on: macos-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable

      - name: Show toolchain information
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: Build release binary
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rust-cli-sysinfo-macos-intel
          path: target/release/rust-cli-sysinfo
          retention-days: 14
